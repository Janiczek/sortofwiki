<style>
  @font-face {
    font-family: "JetBrains Mono";
    font-style: normal;
    font-weight: 100 800;
    font-display: swap;
    src: url("/JetBrainsMono-VariableFont_wght.ttf") format("truetype");
  }

  @font-face {
    font-family: "JetBrains Mono";
    font-style: italic;
    font-weight: 100 800;
    font-display: swap;
    src: url("/JetBrainsMono-Italic-VariableFont_wght.ttf") format("truetype");
  }

  @font-face {
    font-family: "Source Serif 4";
    font-style: normal;
    font-weight: 200 900;
    font-display: swap;
    src: url("/SourceSerif4-VariableFont_opsz,wght.ttf") format("truetype");
  }

  @font-face {
    font-family: "Source Serif 4";
    font-style: italic;
    font-weight: 200 900;
    font-display: swap;
    src: url("/SourceSerif4-Italic-VariableFont_opsz,wght.ttf") format("truetype");
  }

  :root {
    --font-serif: "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background-color: #0c0d0a;
  }

  /* Theme tokens live on .app-root so Tailwind-style `class="dark"` on the same node switches palette. */
  .app-root {
    font-size: 1rem;
    --bg: #f8faec;
    --fg: #181c10;
    --fg-muted: #414d29;
    --link: #34501c;
    --link-hover: #243713;
    --link-bg-hover: #dce8bf;
    --border: #879161;
    --border-dash: #929d6c;
    --chrome-bg: #eff2db;
    --btn-bg: #465e28;
    --btn-fg: #fcfdf6;
    --btn-border: #2d3c17;
    --danger: #6b1010;
    --danger-link-bg-hover: #f7cdcd;
    --danger-bg: #fce8e8;
    /* Filled danger control: same deep red in both roots (dark root keeps --danger as light pink for inline text) */
    --danger-btn-bg: #6b1010;
    --danger-btn-fg: #ffffff;
    --code-bg: #e9ecd3;
    --focus-ring: #587232;
    --input-bg: #ffffff;
    --table-stripe: #e2eac8;
    --table-row-hover: #d6e5b2;
    /* Audit filter chips (badge-style toggles; distinct from primary buttons) */
    --chip-off-bg: var(--input-bg);
    --chip-off-fg: var(--fg-muted);
    --chip-off-border: var(--border);
    --chip-on-bg: #5c7a34;
    --chip-on-fg: #fcfdf6;
    --chip-on-border: #3a4f20;
  }

  /* Math equation hosts (SVG lives in shadow DOM; only host layout belongs here). */
  inline-equation {
    display: inline-block;
    vertical-align: -0.1ex;
  }
  block-equation {
    display: block;
    margin: 0.35rem 0;
    overflow-x: auto;
  }
  .app-root.dark {
    --bg: #16190f;
    --fg: #f0f4e5;
    --fg-muted: #b2bd92;
    --link: #a3cf6e;
    --link-hover: #c5e398;
    --link-bg-hover: #2f3c1f;
    --border: #667944;
    --border-dash: #788b54;
    --chrome-bg: #202815;
    /* Filled control: muted surface (not saturated mint) so actions read calm on dark UI */
    --btn-bg: #313e22;
    --btn-fg: #f3f5e8;
    --btn-border: #637647;
    --danger: #ffb4b4;
    --danger-link-bg-hover: #4a1f25;
    --danger-bg: #2c1418;
    --danger-btn-bg: #6b1010;
    --danger-btn-fg: #ffffff;
    --code-bg: #262f19;
    --focus-ring: #a3cf6e;
    --input-bg: #1c2312;
    --table-stripe: rgba(48, 57, 32, 0.58);
    --table-row-hover: #3f4f2b;
    --chip-off-bg: var(--chrome-bg);
    --chip-off-fg: var(--fg-muted);
    --chip-off-border: var(--border);
    --chip-on-bg: #3d5228;
    --chip-on-fg: #f3f5e8;
    --chip-on-border: #5a7238;
  }

  /* Markdown body tables: quiet, bookish styling inspired by Tufte's restrained rules. */
  .app-root .markdown-body table {
    width: auto;
    max-width: 100%;
    margin: 0.8rem 0 1rem;
    border-collapse: collapse;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    font-size: 0.94em;
    line-height: 1.35;
  }
  .app-root .markdown-body thead th {
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .app-root .markdown-body th,
  .app-root .markdown-body td {
    padding: 0.22rem 0.55rem;
    text-align: left;
    vertical-align: top;
  }
  .app-root .markdown-body tbody tr:nth-child(even) {
    background: var(--table-stripe);
  }
  .app-root .markdown-body tbody tr:hover {
    background: var(--table-row-hover);
  }

</style>
<script src="/tailwind_browser_4.2.2.min.js"></script>
<script>
  window.MathJax = {
    options: {
      enableMenu: false,
      /* Combined bundles include a11y; disable enrichment/speech so no SRE worker (no /sre/ on our server). */
      enableEnrichment: false,
      enableSpeech: false,
      enableBraille: false,
      enableComplexity: false,
      enableExplorer: false,
      menuOptions: {
        settings: {
          enrich: false,
          speech: false,
          braille: false,
          collapsible: false,
          assistiveMml: false,
        },
      },
    },
    svg: { fontCache: 'local' },
    output: {
      font: "mathjax-pagella",
      fontPath: '/mathjax-pagella-font_4.1.1',
    },
  };
</script>
