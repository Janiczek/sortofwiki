<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system,
      "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-serif: "Source Serif 4", "Iowan Old Style", "Palatino Linotype",
      Palatino, Georgia, "Times New Roman", serif;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  /* Scales all rem-based app typography (see .app-root, buttons, etc.) */
  html {
    font-size: 90%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background-color: #0a0e0c;
  }

  /* Theme tokens live on .app-root so Tailwind-style `class="dark"` on the same node switches palette. */
  .app-root {
    font-size: 1rem;
    --bg: #f6faef;
    --fg: #161d12;
    --fg-muted: #3d4f2e;
    --link: #314d1f;
    --link-hover: #223515;
    --border: #809066;
    --border-dash: #8f9d73;
    --chrome-bg: #edf3df;
    --btn-bg: #435f2c;
    --btn-fg: #fbfdf8;
    --btn-border: #2a3d1a;
    --danger: #6b1010;
    --danger-bg: #fce8e8;
    --code-bg: #e6edd9;
    --focus-ring: #537236;
    --input-bg: #ffffff;
    --table-stripe: rgba(237, 243, 223, 0.5);

    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 0.25rem 0.5rem 0;
    font-family: var(--font-sans);
    background-color: var(--bg);
    color: var(--fg);
    line-height: 1.35;
  }

  /* Serif: published article body */
  #page-markdown {
    font-family: var(--font-serif);
  }

  .app-root.dark {
    --bg: #141a11;
    --fg: #eef5e7;
    --fg-muted: #aec09a;
    --link: #9fce74;
    --link-hover: #c2e39f;
    --border: #637a49;
    --border-dash: #758d59;
    --chrome-bg: #1e2917;
    /* Filled control: muted surface (not saturated mint) so actions read calm on dark UI */
    --btn-bg: #2f3f24;
    --btn-fg: #f1f7ea;
    --btn-border: #60774b;
    --danger: #ffb4b4;
    --danger-bg: #2c1418;
    --code-bg: #24301c;
    --focus-ring: #9fce74;
    --input-bg: #1a2414;
    --table-stripe: rgba(46, 60, 34, 0.58);
  }

  .app-root a {
    color: var(--link);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .app-root a:hover {
    color: var(--link-hover);
  }

  .app-root a:focus-visible,
  .app-root button:focus-visible,
  .app-root input:focus-visible,
  .app-root textarea:focus-visible,
  .app-root select:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }

  .app-root h1,
  .app-root h2,
  .app-root h3 {
    margin: 0.35rem 0 0.2rem;
    font-weight: 600;
    line-height: 1.2;
  }

  .app-root h2 {
    font-size: 1.1rem;
  }

  .app-root h3 {
    font-size: 1rem;
  }

  .app-root p {
    margin: 0.25rem 0;
  }


  button {
    font-family: inherit;
    font-size: 1rem;
    padding: 0.2rem 0.45rem;
    margin: 0.1rem 0.15rem 0.1rem 0;
    background: var(--btn-bg);
    color: var(--btn-fg);
    border: 1px solid var(--btn-border);
    border-radius: 3px;
    cursor: pointer;
  }

  button:hover {
    filter: brightness(1.08);
  }

  .app-root.dark button:hover {
    filter: brightness(1.12);
    border-color: var(--border-dash);
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  input[type="text"],
  input[type="password"],
  textarea,
  select {
    font-family: inherit;
    font-size: 1rem;
    padding: 0.15rem 0.3rem;
    margin: 0.1rem 0 0.2rem;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--fg);
    max-width: 100%;
  }

  textarea {
    min-height: 5rem;
    width: 100%;
    max-width: 48rem;
  }

  label {
    display: block;
    margin-top: 0.25rem;
    font-size: 1rem;
    color: var(--fg-muted);
  }


  #page-markdown {
    max-width: 52rem;
    font-size: 0.95rem;
  }

  #page-markdown h1,
  #page-markdown h2,
  #page-markdown h3,
  #page-markdown h4,
  #page-markdown h5,
  #page-markdown h6 {
    margin-top: 0.5rem;
    margin-bottom: 0.25rem;
    font-weight: 600;
    color: var(--fg);
  }

  #page-markdown h1 {
    font-size: 1.3rem;
  }

  #page-markdown h2 {
    font-size: 1.12rem;
  }

  #page-markdown h3 {
    font-size: 1.02rem;
  }

  #page-markdown h4,
  #page-markdown h5,
  #page-markdown h6 {
    font-size: 0.98rem;
  }

  #page-markdown p {
    margin: 0.35rem 0;
  }

  #page-markdown a {
    color: var(--link);
  }

  #page-markdown ul,
  #page-markdown ol {
    margin: 0.25rem 0;
    padding-left: 1.35rem;
  }

  #page-markdown li {
    margin: 0.1rem 0;
  }

  #page-markdown code {
    font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo,
      Consolas, monospace;
    font-size: 0.88em;
    background: var(--code-bg);
    padding: 0.05rem 0.2rem;
    border: none;
  }

  #page-markdown pre {
    margin: 0.35rem 0;
    padding: 0.35rem 0.45rem;
    overflow-x: auto;
    background: var(--code-bg);
    border: 1px solid var(--border);
    font-size: 0.85rem;
    line-height: 1.4;
  }

  #page-markdown pre code {
    border: none;
    padding: 0;
    background: transparent;
  }

  #page-markdown blockquote {
    margin: 0.35rem 0;
    padding: 0.2rem 0.5rem;
    border-left: 3px solid var(--border);
    color: var(--fg-muted);
  }

  #page-backlinks {
    margin-top: 0.5rem;
    max-width: 52rem;
  }

  #page-backlinks h2 {
    margin: 0.2rem 0 0.15rem;
    font-size: 0.95rem;
  }
</style>
<script src="/tailwind_browser_4.2.2.min.js"></script>
