<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --font-serif: "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background-color: #0a0e0c;
  }

  /* Theme tokens live on .app-root so Tailwind-style `class="dark"` on the same node switches palette. */
  .app-root {
    font-size: 1rem;
    --bg: #f6faef;
    --fg: #161d12;
    --fg-muted: #3d4f2e;
    --link: #314d1f;
    --link-hover: #223515;
    --border: #809066;
    --border-dash: #8f9d73;
    --chrome-bg: #edf3df;
    --btn-bg: #435f2c;
    --btn-fg: #fbfdf8;
    --btn-border: #2a3d1a;
    --danger: #6b1010;
    --danger-bg: #fce8e8;
    /* Filled danger control: same deep red in both roots (dark root keeps --danger as light pink for inline text) */
    --danger-btn-bg: #6b1010;
    --danger-btn-fg: #ffffff;
    --code-bg: #e6edd9;
    /* Readonly vs editable in submission conflict grid (must stay visually distinct from each other). */
    --submission-conflict-readonly-bg: #e0e8d3;
    --submission-conflict-editable-bg: #ffffff;
    --focus-ring: #537236;
    --input-bg: #ffffff;
    --table-stripe: rgba(237, 243, 223, 0.5);
  }

  .app-root.dark {
    --bg: #141a11;
    --fg: #eef5e7;
    --fg-muted: #aec09a;
    --link: #9fce74;
    --link-hover: #c2e39f;
    --border: #637a49;
    --border-dash: #758d59;
    --chrome-bg: #1e2917;
    /* Filled control: muted surface (not saturated mint) so actions read calm on dark UI */
    --btn-bg: #2f3f24;
    --btn-fg: #f1f7ea;
    --btn-border: #60774b;
    --danger: #ffb4b4;
    --danger-bg: #2c1418;
    --danger-btn-bg: #6b1010;
    --danger-btn-fg: #ffffff;
    --code-bg: #24301c;
    --submission-conflict-readonly-bg: #161f11;
    --submission-conflict-editable-bg: #2c3d22;
    --focus-ring: #9fce74;
    --input-bg: #1a2414;
    --table-stripe: rgba(46, 60, 34, 0.58);
  }

</style>
